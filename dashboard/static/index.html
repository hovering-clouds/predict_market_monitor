<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Arbitrage Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <div>
          <h1>Arbitrage Dashboard</h1>
          <p class="page-subtitle">监控单市场与双市场套利，同时支持事件级市场查询。</p>
        </div>
        <nav class="page-nav">
          <a class="nav-link active" href="/dashboard">监控面板</a>
          <a class="nav-link" href="/dashboard/event-markets">事件查询</a>
        </nav>
      </header>

      <section class="panel">
        <h2>创建价格监控（单市场）</h2>
        <form id="createForm">
          <label>Monitor 类型
            <select id="monitorType">
              <option value="limitless">Limitless</option>
              <option value="polymarket">Polymarket</option>
              <option value="kalshi">Kalshi</option>
            </select>
          </label>
          <label>Market / 标识
            <input id="market" placeholder="请填写市场slug标识符" />
          </label>
          <label>频率 (秒)
            <input id="freq" type="number" min="1" value="5" />
          </label>
          <button type="submit">创建监控</button>
        </form>
      </section>

      <section class="panel">
        <h2>创建套利监控（双市场）</h2>
        <form id="arbitrageForm">
          <div class="arbitrage-pair">
            <h3>市场1配置</h3>
            <label>Monitor 类型
              <select id="arb-type-1">
                <option value="polymarket">Polymarket</option>
                <option value="kalshi">Kalshi</option>
              </select>
            </label>
            <label>Market / 标识
              <input id="arb-market-1" placeholder="请填写市场slug标识符" />
            </label>
          </div>

          <div class="arbitrage-pair">
            <h3>市场2配置</h3>
            <label>Monitor 类型
              <select id="arb-type-2">
                <option value="polymarket">Polymarket</option>
                <option value="kalshi">Kalshi</option>
              </select>
            </label>
            <label>Market / 标识
              <input id="arb-market-2" placeholder="请填写市场slug标识符" />
            </label>
          </div>

          <div class="arbitrage-pair">
            <h3>套利参数</h3>
            <label>频率 (秒)
              <input id="arb-freq" type="number" min="1" value="5" />
            </label>
            <label>最小套利价差 (min_spread)
              <input id="arb-min-spread" type="number" step="0.0001" min="0" value="0.01" />
            </label>
            <label>单次最大套利比例 (0-1)
              <input id="arb-max-ratio" type="number" step="0.01" min="0" max="1" value="1" />
            </label>
            <label>单次最大套利数量 (0为无限制)
              <input id="arb-max-quantity" type="number" step="1" min="0" value="0" />
            </label>
            <label>单次下单最少数量 (0为不限制)
              <input id="arb-min-order-quantity" type="number" step="0.0001" min="0" value="0" />
            </label>
            <label>单次下单最少金额 (0为不限制)
              <input id="arb-min-order-amount" type="number" step="0.0001" min="0" value="0" />
            </label>
            <label>市场1预分配金额 (>0)
              <input id="arb-market1-budget" type="number" step="0.01" min="0.01" value="100" />
            </label>
            <label>市场2预分配金额 (>0)
              <input id="arb-market2-budget" type="number" step="0.01" min="0.01" value="100" />
            </label>
          </div>

          <button type="submit">创建套利监控</button>
        </form>
      </section>

      <section class="panel">
        <h2>活动监控</h2>
        <div id="monitors"></div>
      </section>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
